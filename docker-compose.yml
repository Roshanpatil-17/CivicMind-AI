services:
  db:
    image: postgres:16-alpine
    container_name: civicmind-db
    environment:
      POSTGRES_DB: civicmind
      POSTGRES_USER: civicmind
      POSTGRES_PASSWORD: civicmind
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicmind -d civicmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: civicmind-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:

